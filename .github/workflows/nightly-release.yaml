name: Nightly release

# Run on every push to main (aka "rolling releases")
#on:
#  push:
#    branches: [main]
#    paths-ignore:
#    - docs/**
#    - '**.md'

# Run once per day (aka "nightly releases")
on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch: # Enable manual runs

permissions:
  packages: write
  contents: read

env:
  NIGHTLY_TAG_NAME: latest-nightly

concurrency:
  group: ymir-nightly-releases
  cancel-in-progress: true

jobs:
  check_date:
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: print latest_commit
        run: echo ${{ github.sha }}

      - id: should_run
        continue-on-error: true
        name: check latest commit is less than a day
        if: ${{ github.event_name == 'schedule' }}
        run: test -z $(git rev-list  --after="24 hours"  ${{ github.sha }}) && echo "should_run=false" >> $GITHUB_OUTPUT

  commit-sha:
    runs-on: ubuntu-latest
    needs: [check_date]
    if: ${{ needs.check_date.outputs.should_run != 'false' }}
    outputs:
      build-version: ${{ steps.get-sha.outputs.short-sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          sparse-checkout: .
      - name: Get short commit SHA
        id: get-sha
        run: echo "short-sha=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

  build-all:
    uses: StrikerX3/Ymir/.github/workflows/build.yaml@main
    needs: [commit-sha]
    with:
      dev-build: true
      debug-symbols: true
      build-version: ${{ needs.commit-sha.outputs.build-version }}

  release:
    runs-on: ubuntu-latest
    needs: [build-all]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create/update ${{ env.NIGHTLY_TAG_NAME }} tag
        run: |
          git tag -f ${{ env.NIGHTLY_TAG_NAME }}
          git push origin -f --tags

      - name: Download Ymir artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ymir
          pattern: ymir-*
          merge-multiple: true

      - name: Delete existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ env.NIGHTLY_TAG_NAME }} --yes --cleanup-tag
        continue-on-error: true  # will fail if the tag doesn't exist

      - name: Generate release notes
        run: |
          cp .github/workflows/release-notes-nightly.md release-notes.md
          echo "<!-- Auto-generated section. Do not delete this! -->" >> release-notes.md
          echo "<!-- @@ Version-String [${{ needs.build-all.outputs.app-version }}] @@ -->" >> release-notes.md
          echo "<!-- @@ Build-Timestamp [${{ needs.build-all.outputs.build-timestamp }}] @@ -->" >> release-notes.md

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.NIGHTLY_TAG_NAME }} \
            --draft \
            --prerelease \
            --title "Latest nightly release" \
            --notes-file release-notes.md \
            ymir/*

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ env.NIGHTLY_TAG_NAME }} \
            --draft=false
